schema_version: 1

context:
  name: probeinterface
  version: "0.3.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/probeinterface-${{ version }}.tar.gz
  sha256: 8cf02afb1f344be027e1f29e7a2c54fd35b38573ad77890fc5076f957ddf3db5

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - numpy
    - packaging
    - requests

tests:
  - python:
      imports:
        - probeinterface
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: Python package to handle probe layout, geometry and wiring to device.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/SpikeInterface/probeinterface
  repository: https://github.com/SpikeInterface/probeinterface
  documentation: https://probeinterface.readthedocs.io/

extra:
  recipe-maintainers:
    - dhmjhu
