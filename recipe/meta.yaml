{% set name = "probeinterface" %}
{% set version = "0.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/probeinterface-{{ version }}.tar.gz
  sha256: e036412bac4608569ddd61403d8408548715f6d3d03af2a68c344426b1a5668c

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - numpy
    - packaging

test:
  imports:
    - probeinterface
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/SpikeInterface/probeinterface
  summary: Python package to handle probe layout, geometry and wiring to device.
  license: MIT
  license_file: LICENSE
  doc_url: https://probeinterface.readthedocs.io/
  dev_url: https://github.com/SpikeInterface/probeinterface

extra:
  recipe-maintainers:
    - dhmjhu
