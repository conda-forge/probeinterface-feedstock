{% set name = "probeinterface" %}
{% set version = "0.2.25" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/probeinterface-{{ version }}.tar.gz
  sha256: f86e40bbcc2917b1a190b834ee53c582e2a3463b13b765025858f2fb2366d852

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=62.0
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - packaging

test:
  imports:
    - probeinterface
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/SpikeInterface/probeinterface
  summary: Python package to handle probe layout, geometry and wiring to device.
  license: MIT
  license_file: LICENSE
  doc_url: https://probeinterface.readthedocs.io/
  dev_url: https://github.com/SpikeInterface/probeinterface

extra:
  recipe-maintainers:
    - dhmjhu
